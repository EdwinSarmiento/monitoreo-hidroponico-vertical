<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evidencia pH 4.3 - Hidroponia IoT</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.8);
            --accent-color: #238636;
            --accent-glow: #2ea043;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --error-color: #f85149;
            --warning-color: #d29922;
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, rgba(35, 134, 54, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(56, 139, 253, 0.05) 0px, transparent 50%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wrapper {
            max-width: 420px;
            width: 100%;
            padding: 1rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 800;
        }

        .accent { color: var(--accent-glow); }

        .evidence-badge {
            background: rgba(248, 81, 73, 0.2);
            color: var(--error-color);
            border: 1px solid var(--error-color);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(8px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            align-items: center;
        }

        .label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
        }

        .trend {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--error-color);
        }

        .sensor-value {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0.5rem 0;
            display: flex;
            align-items: baseline;
            justify-content: center;
            color: var(--warning-color);
        }

        .unit {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-left: 0.5rem;
        }

        .ph-gauge-bar {
            width: 100%;
            height: 8px;
            background: linear-gradient(to right, #f85149, #d29922, #4ade80, #388bfd, #8957e5);
            border-radius: 4px;
            position: relative;
            margin: 1.5rem 0;
        }

        .marker {
            position: absolute;
            top: -6px;
            width: 4px;
            height: 20px;
            background: white;
            box-shadow: 0 0 10px white;
            border-radius: 2px;
            left: 30.7%;
        }

        .sensor-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: center;
        }

        .ph-status {
            text-align: center;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            background: rgba(248, 81, 73, 0.15);
            color: var(--error-color);
            border: 1px solid var(--error-color);
            animation: flash 1.5s infinite;
        }

        @keyframes flash {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.02); }
            100% { opacity: 1; transform: scale(1); }
        }

        .timestamp {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        footer {
            margin-top: 1.5rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="logo">
                <span class="icon">🌿</span>
                <h1>Hidroponia <span class="accent">IoT</span></h1>
            </div>
            <div class="evidence-badge">Evidencia</div>
        </header>

        <div class="card sensor-card">
            <div class="card-header">
                <span class="label">Nivel de pH</span>
                <span class="trend">● Ácido</span>
            </div>
            <div class="sensor-value">
                <span>4.3</span><span class="unit">pH</span>
            </div>
            <div class="ph-gauge-bar">
                <div class="marker"></div>
            </div>
            <div class="sensor-meta">Voltaje: 2.78 V</div>
            <div class="ph-status">⚠ pH bajo — Fuera de rango óptimo (5.5 – 6.5)</div>
        </div>

        <p class="timestamp">Captura de evidencia — Sistema Hidroponia IoT</p>

        <footer>
            <p>Hidroponia IoT Cloud &copy; 2026 - Control Remoto via MQTT</p>
        </footer>
    </div>
</body>
</html>
