version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto-broker-local
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT Port
      - "9001:9001"   # WebSockets Port
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - hydroponics-local

  web-ui:
    image: nginx:alpine
    container_name: hydroponics-ui-local
    restart: unless-stopped
    ports:
      - "8080:80"     # Web access at http://localhost:8080
    volumes:
      - ../web-ui:/usr/share/nginx/html
    networks:
      - hydroponics-local

networks:
  hydroponics-local:
    driver: bridge
