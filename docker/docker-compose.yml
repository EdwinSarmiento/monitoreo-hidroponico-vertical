# Hidroponia IoT - Stack unificado (local y producción)
#
# Uso:
#   docker compose up -d            (local, sin auth en mosquitto)
#   docker compose up -d --build    (si cambias archivos de web-ui)
#
# Producción con auth:
#   1. cp .env.example .env          (ajustar puertos si hace falta)
#   2. Editar mosquitto.conf: descomentar password_file, comentar allow_anonymous
#   3. docker compose exec mosquitto mosquitto_passwd -c /mosquitto/config/passwd <usuario>
#   4. docker compose restart mosquitto

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: hidro-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - hidro-net

  web-ui:
    image: nginx:alpine
    container_name: hidro-web-ui
    restart: unless-stopped
    ports:
      - "${WEB_UI_PORT:-8080}:80"
    volumes:
      - ../web-ui:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mosquitto
    networks:
      - hidro-net

networks:
  hidro-net:
    driver: bridge
