services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: hidro-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSockets
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - hidro-net

  web-ui:
    image: nginx:alpine
    container_name: hidro-web-ui
    restart: unless-stopped
    ports:
      - "8080:80"     # Acceso web: http://localhost:8080
    volumes:
      - ../web-ui:/usr/share/nginx/html:ro
    depends_on:
      - mosquitto
    networks:
      - hidro-net

networks:
  hidro-net:
    driver: bridge
