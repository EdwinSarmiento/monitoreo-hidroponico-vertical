persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

# Puerto TCP para ESP32 (conexión directa)
listener 1883 0.0.0.0
allow_anonymous true

# Puerto WebSockets interno (Nginx hace proxy SSL hacia aquí)
# En producción, el navegador se conecta vía wss://<dominio>/mqtt → Nginx → este puerto.
# En desarrollo local, el navegador se conecta directo por ws://<ip>:9001.
listener 9001 0.0.0.0
protocol websockets
allow_anonymous true

# --- Producción con autenticación ---
# Para habilitar auth:
#   1. Comentar las dos líneas "allow_anonymous true"
#   2. Descomentar la línea password_file
#   3. Crear el archivo passwd:
#      docker compose exec mosquitto mosquitto_passwd -c /mosquitto/config/passwd <usuario>
#   4. docker compose restart mosquitto
#   5. Configurar el mismo usuario/contraseña en el portal MQTT de la ESP32
#
# allow_anonymous false
# password_file /mosquitto/config/passwd
