# Mosquitto — stack docker-prod (usuario/contraseña obligatorios)
# passwd: ./scripts/gen-mqtt-passwd.sh desde la raíz docker-prod

persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

listener 1883 0.0.0.0
allow_anonymous true

listener 9001 0.0.0.0
protocol websockets
allow_anonymous true

# En Internet público conviene TLS (8883 / wss) detrás de un proxy.
