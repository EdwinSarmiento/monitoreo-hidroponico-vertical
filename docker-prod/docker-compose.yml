# Stack de prueba / producción (MQTT con usuario y contraseña).
# Carpeta separada de docker-iot (desarrollo local anónimo).
#
# Desde esta carpeta (docker-prod):
#   1. cp .env.example .env
#   2. ./scripts/gen-mqtt-passwd.sh <usuario> '<contraseña>'
#   3. docker compose --env-file .env up -d
#
# Credenciales: mismas en passwd, portal MQTT del ESP32 y web UI.

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto-broker-prod
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/config/passwd:/mosquitto/config/passwd:ro
      - mosquitto-prod-data:/mosquitto/data
      - mosquitto-prod-log:/mosquitto/log
    networks:
      - hydroponics-prod
    healthcheck:
      test: ["CMD-SHELL", "pidof mosquitto || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web-ui:
    image: nginx:alpine
    container_name: hydroponics-ui-prod
    restart: unless-stopped
    ports:
      - "${WEB_UI_PORT:-8080}:80"
    volumes:
      - ../web-ui:/usr/share/nginx/html:ro
    depends_on:
      mosquitto:
        condition: service_healthy
    networks:
      - hydroponics-prod

volumes:
  mosquitto-prod-data:
  mosquitto-prod-log:

networks:
  hydroponics-prod:
    driver: bridge
